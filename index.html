<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>大先生于漪 · 纪念文汇</title>
    <style>
        /* ---------- 极简重置 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 温暖的浅色背景 - 米白/暖灰，不压抑 */
            background-color: #f8f5f0;    /* 柔白底色，略带暖意 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            /* 黑体字族 */
            font-family: 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', '黑体', 'Hei', 'Arial Black', sans-serif;
            font-weight: 500;
            line-height: 1.4;
            color: #2e2a24;                 /* 深褐色文字，与浅底搭配舒适 */
        }

        /* 居中卡片 — 极简无装饰 */
        .memorial {
            max-width: 800px;
            width: 100%;
            text-align: center;
            background: transparent;
            padding: 2rem 0.5rem;
        }

        /* 主标题：黑体 + 动态发光效果 (在浅色背景下柔和发光) */
        .main-title {
            font-size: clamp(2.4rem, 11vw, 4.2rem);
            font-family: inherit;           /* 继承黑体 */
            font-weight: 600;               /* 黑体加一点力度 */
            color: #3a332b;                  /* 深褐色，稳重 */
            margin-bottom: 0.3rem;
            line-height: 1.2;
            word-break: keep-all;
            letter-spacing: 1px;
            cursor: pointer;
            display: inline-block;
            /* 浅色背景下的发光：温暖的浅金色光晕 */
            text-shadow: 0 0 8px rgba(230, 190, 140, 0.3),
                         0 0 16px rgba(220, 170, 110, 0.2),
                         0 0 24px rgba(200, 150, 90, 0.1);
            transition: text-shadow 0.6s ease-in-out, color 0.4s ease;
            /* 动画发光：柔和呼吸，更温暖 */
            animation: softGlow 3.8s infinite alternate;
        }

        /* 副标题：同样黑体 + 动态发光 */
        .sub-title {
            font-size: clamp(1.3rem, 6vw, 2.1rem);
            font-family: inherit;
            font-weight: 450;
            color: #5a4f44;                  /* 中褐色，比主标题稍浅 */
            margin-bottom: 0.8rem;
            letter-spacing: 0.8px;
            cursor: pointer;
            display: inline-block;
            text-shadow: 0 0 6px rgba(210, 170, 120, 0.35),
                         0 0 14px rgba(200, 155, 100, 0.2),
                         0 0 22px rgba(170, 130, 80, 0.1);
            animation: softGlowSub 4.2s infinite alternate;
            transition: all 0.3s;
        }

        /* 主发光动画 —— 在浅色背景上呈现暖色呼吸感 */
        @keyframes softGlow {
            0% {
                text-shadow: 0 0 6px rgba(210, 170, 120, 0.25),
                             0 0 14px rgba(200, 155, 100, 0.15),
                             0 0 22px rgba(170, 130, 80, 0.1);
                color: #3a332b;
            }
            50% {
                text-shadow: 0 0 14px rgba(230, 190, 140, 0.6),
                             0 0 26px rgba(220, 175, 120, 0.4),
                             0 0 38px rgba(200, 155, 100, 0.25);
                color: #2f281f;
            }
            100% {
                text-shadow: 0 0 10px rgba(220, 180, 130, 0.45),
                             0 0 22px rgba(210, 165, 110, 0.3),
                             0 0 32px rgba(190, 145, 90, 0.2);
                color: #3e352b;
            }
        }

        /* 副标题发光动画 (节奏稍缓，幅度稍弱，形成层次) */
        @keyframes softGlowSub {
            0% {
                text-shadow: 0 0 5px rgba(200, 160, 110, 0.3),
                             0 0 12px rgba(190, 145, 95, 0.2),
                             0 0 20px rgba(160, 125, 75, 0.1);
                color: #5a4f44;
            }
            100% {
                text-shadow: 0 0 12px rgba(220, 180, 130, 0.6),
                             0 0 24px rgba(210, 165, 110, 0.4),
                             0 0 35px rgba(190, 145, 90, 0.25);
                color: #4d4035;
            }
        }

        /* 悬停时增强发光效果，依然保持温暖 */
        .main-title:hover,
        .sub-title:hover {
            animation: none;                /* 暂停动画以便聚焦于hover增强光效 */
            text-shadow: 0 0 18px #e5c49c, 0 0 32px #d6a87c, 0 0 50px #b58b60;
            transition: text-shadow 0.3s;
            color: #2b231d;
        }

        /* 触摸反馈 (移动端) */
        .main-title:active,
        .sub-title:active {
            opacity: 0.8;
            transform: scale(0.99);
            transition: transform 0.1s;
        }

        /* 键盘焦点指示器，保持可访问 */
        .main-title:focus-visible,
        .sub-title:focus-visible {
            outline: 2px solid #b5926a;
            outline-offset: 8px;
            border-radius: 2px;
        }

        /* 移除任何多余的链接块，无地址文本 */
    </style>
</head>
<body>
    <div class="memorial">
        <!-- 主标题：点击跳转，黑体，动态发光，温暖浅色背景 -->
        <h1 class="main-title" 
            onclick="window.location.href='https://f4c5-117-143-19-35.ngrok-free.app/'" 
            role="link" 
            tabindex="0"
            onkeydown="if(event.key==='Enter'||event.key===' ') window.location.href='https://f4c5-117-143-19-35.ngrok-free.app/';">
            大先生于漪·纪念文汇
        </h1>

        <!-- 副标题：同样点击跳转，黑体，动态发光，温暖浅色背景 -->
        <p class="sub-title" 
           onclick="window.location.href='https://f4c5-117-143-19-35.ngrok-free.app/'"
           role="link"
           tabindex="0"
           onkeydown="if(event.key==='Enter'||event.key===' ') window.location.href='https://f4c5-117-143-19-35.ngrok-free.app/';">
            （点击文字进入下一页——点击“visit sites”——稍候即可浏览）
        </p>

        <!-- 完全符合：无任何链接文本，只有两行可点击标题，黑体，动态发光，浅色背景不压抑 -->
    </div>
</body>
</html>
